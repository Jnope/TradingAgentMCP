services:
  tradingagents-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: trading-agents-mcp:latest
    container_name: trading-agents-mcp
    restart: always
    entrypoint: ["python", "-m", "tradingagents_mcp"]
    privileged: true
    network_mode: "host"
    env_file:
      - ../.env
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 19876
      TRADINGAGENTS_LOG_LEVEL: INFO
      MCP_CLOSE_PROXY: "true"
    volumes:
      - /mnt/disk3/.tradingagents:/root/.tradingagents